<!DOCTYPE html>
<html lang="en" data-theme="dark" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kiro Gateway - Multi-account proxy management console for Claude API">
    <title>Kiro Gateway - Console</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Alpine.js Collapse Plugin (must load before Alpine.js) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>

    <!-- Alpine.js (deferred) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CSS (compiled) -->
    <link rel="stylesheet" href="css/output.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-kiro-bg text-kiro-text font-sans antialiased min-h-screen overflow-hidden"
      x-cloak x-data="app" x-init="init()">

    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Toast Notification -->
    <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none" role="status" aria-live="polite" aria-atomic="true">
        <template x-if="$store.global.toast">
            <div x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-8 scale-95"
                x-transition:enter-end="opacity-100 translate-x-0 scale-100"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-x-0 scale-100"
                x-transition:leave-end="opacity-0 translate-x-4 scale-95"
                class="alert shadow-lg border backdrop-blur-md pointer-events-auto min-w-[300px]"
                :class="{
                    'border-blue-500/20 bg-kiro-primary/90 text-blue-400': $store.global.toast.type === 'info',
                    'border-kiro-cta/20 bg-kiro-primary/90 text-kiro-cta': $store.global.toast.type === 'success',
                    'border-red-500/20 bg-kiro-primary/90 text-red-400': $store.global.toast.type === 'error'
                }"
                role="alert">
                <div class="flex items-center gap-3">
                    <template x-if="$store.global.toast.type === 'info'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                    <template x-if="$store.global.toast.type === 'success'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                    <template x-if="$store.global.toast.type === 'error'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </template>
                    <span x-text="$store.global.toast.message" class="font-mono text-sm"></span>
                </div>
            </div>
        </template>
    </div>

    <!-- Navbar -->
    <header class="h-14 border-b border-kiro-secondary flex items-center px-4 lg:px-6 justify-between bg-kiro-primary/50 backdrop-blur-md z-50 relative" role="banner">
        <div class="flex items-center gap-3">
            <!-- Mobile Menu Button -->
            <button @click="toggleSidebar()"
                    class="text-kiro-text/60 hover:text-kiro-text focus:outline-none p-1 transition-colors lg:hidden"
                    aria-label="Toggle navigation menu"
                    aria-expanded="false"
                    :aria-expanded="sidebarOpen.toString()">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

            <div class="w-8 h-8 rounded bg-gradient-to-br from-kiro-cta to-blue-600 flex items-center justify-center text-white font-bold shadow-lg shadow-kiro-cta/40" aria-hidden="true">
                KG
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-bold tracking-wide text-kiro-text">KIRO GATEWAY</span>
                <div class="flex items-center gap-1.5">
                    <span class="text-[10px] text-kiro-text/60 font-mono tracking-wider">CLAUDE PROXY SYSTEM</span>
                    <span class="text-[10px] text-kiro-text/60 font-mono tracking-wider" x-text="'v' + $store.global.version"></span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <!-- Connection Status -->
            <div class="flex items-center gap-2 px-3 py-1 rounded-full text-xs font-mono border transition-all duration-300"
                :class="connectionStatus === 'connected'
                    ? 'bg-kiro-cta/10 border-kiro-cta/20 text-kiro-cta'
                    : (connectionStatus === 'connecting' ? 'bg-yellow-500/10 border-yellow-500/20 text-yellow-500' : 'bg-red-500/10 border-red-500/20 text-red-500')"
                role="status"
                :aria-label="'Connection status: ' + (connectionStatus === 'connected' ? 'Online' : (connectionStatus === 'disconnected' ? 'Offline' : 'Connecting'))">
                <div class="w-1.5 h-1.5 rounded-full"
                    :class="connectionStatus === 'connected' ? 'bg-kiro-cta shadow-lg shadow-kiro-cta/60' : (connectionStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500')"
                    aria-hidden="true">
                </div>
                <span x-text="connectionStatus === 'connected' ? 'ONLINE' : (connectionStatus === 'disconnected' ? 'OFFLINE' : 'CONNECTING')"></span>
            </div>

            <div class="h-4 w-px bg-kiro-secondary" aria-hidden="true"></div>

            <!-- Refresh Button -->
            <button type="button"
                    class="btn btn-ghost btn-xs btn-square text-kiro-text/60 hover:text-kiro-text hover:bg-white/5"
                    @click="fetchData"
                    :disabled="loading"
                    :aria-label="loading ? 'Refreshing data...' : 'Refresh data'"
                    title="Refresh Data">
                <svg class="w-4 h-4" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Layout -->
    <div class="flex h-[calc(100vh-56px)] relative">
        <!-- Mobile Sidebar Overlay -->
        <div x-show="sidebarOpen"
             x-transition:enter="transition-opacity ease-linear duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition-opacity ease-linear duration-300"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="sidebarOpen = false"
             class="fixed inset-0 bg-black/50 z-40 lg:hidden"
             style="display: none;"></div>

        <!-- Sidebar -->
        <aside class="fixed top-14 bottom-0 left-0 z-40 bg-kiro-primary border-r border-kiro-secondary transition-all duration-300 shadow-2xl overflow-hidden lg:static lg:h-auto lg:shadow-none lg:flex-shrink-0"
               role="navigation"
               aria-label="Main navigation"
               :class="{
                   'translate-x-0': sidebarOpen,
                   '-translate-x-full': !sidebarOpen,
                   'w-64': sidebarOpen,
                   'lg:translate-x-0': true,
                   'lg:w-64': true
               }">

            <div class="w-64 flex flex-col h-full pt-6 pb-4 flex-shrink-0">
                <!-- Mobile Menu Header -->
                <div class="flex items-center justify-between px-4 mb-6 lg:hidden">
                    <span class="text-sm font-bold text-kiro-text">Menu</span>
                    <button @click="sidebarOpen = false"
                            class="text-kiro-text/60 hover:text-kiro-text"
                            aria-label="Close navigation menu">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Main Section -->
                <div class="px-4 mb-2 text-xs font-bold text-kiro-text/40 uppercase tracking-widest hidden lg:block" role="heading" aria-level="2">Main</div>

                <nav class="flex flex-col gap-1" aria-label="Primary navigation">
                    <button class="nav-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-kiro-text/60 hover:text-kiro-text hover:bg-white/5 transition-colors cursor-pointer"
                            :class="{'active bg-kiro-cta/15 text-kiro-cta border-l-3 border-kiro-cta': $store.global.activeTab === 'dashboard'}"
                            @click="$store.global.activeTab = 'dashboard'; sidebarOpen = window.innerWidth >= 1024"
                            :aria-current="$store.global.activeTab === 'dashboard' ? 'page' : false"
                            aria-label="Dashboard">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                        <span>Dashboard</span>
                    </button>
                    <button class="nav-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-kiro-text/60 hover:text-kiro-text hover:bg-white/5 transition-colors cursor-pointer"
                            :class="{'active bg-kiro-cta/15 text-kiro-cta border-l-3 border-kiro-cta': $store.global.activeTab === 'models'}"
                            @click="$store.global.activeTab = 'models'; sidebarOpen = window.innerWidth >= 1024"
                            :aria-current="$store.global.activeTab === 'models' ? 'page' : false"
                            aria-label="Models">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                        <span>Models</span>
                    </button>
                    <button class="nav-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-kiro-text/60 hover:text-kiro-text hover:bg-white/5 transition-colors cursor-pointer relative"
                            :class="{'active bg-kiro-cta/15 text-kiro-cta border-l-3 border-kiro-cta': $store.global.activeTab === 'accounts'}"
                            @click="$store.global.activeTab = 'accounts'; sidebarOpen = window.innerWidth >= 1024"
                            :aria-current="$store.global.activeTab === 'accounts' ? 'page' : false"
                            aria-label="Accounts (New feature)">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span>Accounts</span>
                        <span class="absolute top-2 right-4 px-1.5 py-0.5 bg-kiro-cta/20 text-kiro-cta text-[9px] font-mono rounded uppercase" aria-label="New feature badge">New</span>
                    </button>
                </nav>

                <div class="px-4 mt-8 mb-2 text-xs font-bold text-kiro-text/40 uppercase tracking-widest" role="heading" aria-level="2">System</div>
                <nav class="flex flex-col gap-1" aria-label="System navigation">
                    <button class="nav-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-kiro-text/60 hover:text-kiro-text hover:bg-white/5 transition-colors cursor-pointer"
                            :class="{'active bg-kiro-cta/15 text-kiro-cta border-l-3 border-kiro-cta': $store.global.activeTab === 'logs'}"
                            @click="$store.global.activeTab = 'logs'; sidebarOpen = window.innerWidth >= 1024"
                            :aria-current="$store.global.activeTab === 'logs' ? 'page' : false"
                            aria-label="Logs">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span>Logs</span>
                    </button>
                    <button class="nav-item flex items-center gap-3 px-6 py-3 text-sm font-medium text-kiro-text/60 hover:text-kiro-text hover:bg-white/5 transition-colors cursor-pointer"
                            :class="{'active bg-kiro-cta/15 text-kiro-cta border-l-3 border-kiro-cta': $store.global.activeTab === 'settings'}"
                            @click="$store.global.activeTab = 'settings'; sidebarOpen = window.innerWidth >= 1024"
                            :aria-current="$store.global.activeTab === 'settings' ? 'page' : false"
                            aria-label="Settings">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span>Settings</span>
                    </button>
                </nav>

                <!-- Footer -->
                <footer class="mt-auto px-6 text-xs text-kiro-text/40 font-mono">
                    <div class="flex justify-center">
                        <a href="https://github.com/jwadow/kiro-gateway" target="_blank" rel="noopener noreferrer"
                           class="flex items-center gap-1.5 hover:text-kiro-cta transition-colors"
                           aria-label="View source code on GitHub (opens in new tab)">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                            <span>GitHub</span>
                        </a>
                    </div>
                </footer>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-auto bg-kiro-bg relative" role="main" aria-label="Main content">
            <!-- Dashboard -->
            <div x-show="$store.global.activeTab === 'dashboard'" x-load-view="'dashboard'" class="w-full" role="region" aria-label="Dashboard view"></div>

            <!-- Models -->
            <div x-show="$store.global.activeTab === 'models'" x-load-view="'models'" class="w-full" role="region" aria-label="Models view"></div>

            <!-- Accounts -->
            <div x-show="$store.global.activeTab === 'accounts'" x-load-view="'accounts'" class="w-full" role="region" aria-label="Accounts view"></div>

            <!-- Logs -->
            <div x-show="$store.global.activeTab === 'logs'" x-load-view="'logs'" class="w-full h-full" role="region" aria-label="Logs view"></div>

            <!-- Settings -->
            <div x-show="$store.global.activeTab === 'settings'" x-load-view="'settings'" class="w-full" role="region" aria-label="Settings view"></div>
        </main>
    </div>

    <!-- Scripts - Loading Order Matters! -->
    <script src="js/config/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/data-store.js"></script>
    <script src="js/settings-store.js"></script>
    <script src="js/components/dashboard.js"></script>
    <script src="js/components/models.js"></script>
    <script src="js/components/accounts.js"></script>
    <script src="js/components/logs-viewer.js"></script>
    <script src="js/components/settings.js"></script>
    <script src="app.js"></script>
</body>
</html>
