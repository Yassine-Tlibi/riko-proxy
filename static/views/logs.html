<div x-data="logsViewer" class="h-full flex flex-col">
    <!-- Header -->
    <div class="p-6 border-b border-kiro-secondary">
        <div class="flex items-center justify-between gap-4 mb-4">
            <div class="flex flex-wrap items-center gap-4">
                <h1 class="text-2xl font-bold text-kiro-text tracking-tight">
                    Logs
                </h1>
                <div class="flex items-center h-6 px-3 rounded-full bg-kiro-secondary/50 border border-kiro-secondary shadow-sm backdrop-blur-sm">
                    <span class="text-[10px] font-mono text-kiro-text/60 uppercase tracking-wider">
                        SYSTEM LOGS
                    </span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-3">
                <!-- Auto Refresh Toggle -->
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" x-model="autoRefresh" class="checkbox checkbox-sm checkbox-success">
                    <span class="text-xs font-mono text-kiro-text/60">Auto-refresh</span>
                </label>

                <!-- Refresh Button -->
                <button @click="loadLogs()"
                        :disabled="loading"
                        class="btn btn-sm bg-kiro-secondary hover:bg-kiro-cta border-kiro-secondary hover:border-kiro-cta text-kiro-text">
                    <svg class="w-4 h-4" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex items-center gap-3">
            <!-- Search -->
            <div class="relative flex-1">
                <input type="text"
                       x-model="searchQuery"
                       placeholder="Search logs..."
                       class="input input-sm w-full bg-kiro-primary border-kiro-secondary text-kiro-text placeholder-kiro-text/40 font-mono text-xs">
                <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-kiro-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>

            <!-- Level Filter -->
            <select x-model="levelFilter" class="select select-sm bg-kiro-primary border-kiro-secondary text-kiro-text font-mono text-xs">
                <option value="all">All Levels</option>
                <option value="DEBUG">Debug</option>
                <option value="INFO">Info</option>
                <option value="WARNING">Warning</option>
                <option value="ERROR">Error</option>
                <option value="CRITICAL">Critical</option>
            </select>
        </div>
    </div>

    <!-- Logs Container -->
    <div class="flex-1 overflow-y-auto p-6 space-y-2 font-mono text-xs">
        <template x-for="(log, index) in filteredLogs" :key="index">
            <div class="flex items-start gap-3 p-3 bg-kiro-primary border border-kiro-secondary rounded hover:border-kiro-secondary/60 transition-colors">
                <!-- Timestamp -->
                <span class="text-kiro-text/40 whitespace-nowrap" x-text="log.timestamp"></span>

                <!-- Level -->
                <span class="font-bold whitespace-nowrap" :class="getLevelColor(log.level)" x-text="log.level"></span>

                <!-- Message -->
                <span class="text-kiro-text/80 flex-1" x-text="log.message"></span>
            </div>
        </template>

        <!-- Empty State -->
        <div x-show="filteredLogs.length === 0" class="flex flex-col items-center justify-center py-12">
            <div class="w-16 h-16 rounded-full bg-kiro-secondary/30 flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-kiro-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <p class="text-sm font-mono text-kiro-text/60">No logs available</p>
        </div>
    </div>
</div>
