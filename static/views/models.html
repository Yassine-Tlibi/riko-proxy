<div x-data="models" class="p-6 space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between gap-4 mb-6">
        <div class="flex flex-wrap items-center gap-4">
            <h1 class="text-2xl font-bold text-kiro-text tracking-tight">
                Models
            </h1>
            <div class="flex items-center h-6 px-3 rounded-full bg-kiro-secondary/50 border border-kiro-secondary shadow-sm backdrop-blur-sm">
                <span class="text-[10px] font-mono text-kiro-text/60 uppercase tracking-wider">
                    AVAILABLE MODELS
                </span>
            </div>
        </div>

        <!-- Search -->
        <div class="relative">
            <input type="text"
                   x-model="searchQuery"
                   placeholder="Search models..."
                   class="input input-sm bg-kiro-primary border-kiro-secondary text-kiro-text placeholder-kiro-text/40 font-mono text-xs">
            <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-kiro-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
    </div>

    <!-- Loading State -->
    <div x-show="loading" class="flex items-center justify-center py-12">
        <div class="flex items-center gap-3">
            <div class="w-5 h-5 border-2 border-kiro-cta border-t-transparent rounded-full animate-spin"></div>
            <span class="text-sm font-mono text-kiro-text/60">Loading models...</span>
        </div>
    </div>

    <!-- Models Grid -->
    <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="model in filteredModels" :key="model.id">
            <div class="bg-kiro-primary border border-kiro-secondary rounded-xl p-5 hover:border-kiro-cta/50 transition-all duration-200 group cursor-pointer">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-kiro-cta shadow-lg shadow-kiro-cta/50"></div>
                        <h3 class="font-mono text-sm text-kiro-text font-bold" x-text="model.id"></h3>
                    </div>
                    <svg class="w-4 h-4 text-kiro-text/20 group-hover:text-kiro-cta/70 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                </div>

                <div class="space-y-2 text-xs font-mono">
                    <div class="flex justify-between">
                        <span class="text-kiro-text/60">Owner:</span>
                        <span class="text-kiro-text" x-text="model.owned_by || 'kiro'"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-kiro-text/60">Created:</span>
                        <span class="text-kiro-text" x-text="new Date(model.created * 1000).toLocaleDateString()"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="!loading && filteredModels.length === 0" class="flex flex-col items-center justify-center py-12">
        <div class="w-16 h-16 rounded-full bg-kiro-secondary/30 flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-kiro-text/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
        </div>
        <p class="text-sm font-mono text-kiro-text/60">No models found</p>
    </div>
</div>
